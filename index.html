<style>
:root{--gold:#C9A84C;--gold-dim:rgba(201,168,76,0.12);--dark1:#0a0a08;--dark2:#111109;--dark3:#1a1a14;--border:rgba(201,168,76,0.15);--white:#f5f0e8;--white-dim:rgba(245,240,232,0.6);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark1);color:var(--white);font-family:'Montserrat',sans-serif;min-height:100vh;}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:40px;width:100%;max-width:380px;text-align:center;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--gold);margin-bottom:6px;}
.login-sub{font-size:11px;color:var(--white-dim);margin-bottom:30px;letter-spacing:1px;}
.login-title{font-size:13px;color:var(--white);margin-bottom:20px;font-weight:600;}
.login-input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:4px;padding:12px 16px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--gold);}
.btn-login{width:100%;background:var(--gold);color:#000;border:none;padding:13px;border-radius:4px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:1px;}
.btn-login:hover{opacity:0.9;}
.login-error{color:#f87171;font-size:11px;margin-top:10px;display:none;padding:8px;background:rgba(248,113,113,0.1);border-radius:4px;}
/* LOADING */
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-msg{font-size:12px;color:var(--white-dim);}
/* DASHBOARD */
#dashboard{display:none;min-height:100vh;}
.dash-nav{background:var(--dark2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.dash-brand{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);}
.dash-meta{display:flex;align-items:center;gap:12px;}
#nav-email{font-size:10px;color:var(--white-dim);}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--white-dim);padding:6px 14px;border-radius:3px;font-size:10px;cursor:pointer;font-family:'Montserrat',sans-serif;}
.dash-main{padding:24px 20px;max-width:1200px;margin:0 auto;}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--dark2);border:1px solid var(--border);border-radius:6px;padding:16px;text-align:center;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:36px;color:var(--gold);}
.stat-label{font-size:10px;color:var(--white-dim);margin-top:4px;letter-spacing:1px;}
/* ALERTS */
.alert-section{margin-bottom:20px;}
.alert-title{font-size:11px;font-weight:600;color:var(--white);margin-bottom:8px;letter-spacing:1px;}
.alert-list{display:flex;flex-wrap:wrap;gap:6px;}
.alert-chip{padding:5px 12px;border-radius:3px;font-size:10px;font-weight:600;}
.chip-red{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
.chip-yellow{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);}
.chip-blue{background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3);}
/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{background:var(--dark2);border:1px solid var(--border);color:var(--white-dim);padding:6px 14px;border-radius:3px;font-size:10px;cursor:pointer;font-family:'Montserrat',sans-serif;}
.filter-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
/* CLIENT CARDS */
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.client-card{background:var(--dark2);border:1px solid var(--border);border-radius:6px;padding:16px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.card-name{font-size:13px;font-weight:600;color:var(--white);}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;}
.badge{padding:2px 8px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:0.5px;}
.b-active{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
.b-inactive{background:rgba(255,255,255,0.05);color:var(--white-dim);border:1px solid var(--border);}
.b-renew{background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3);}
.card-info{font-size:10px;color:var(--white-dim);line-height:2.1;margin-bottom:12px;}
.card-info span{color:var(--white);font-weight:500;}
.card-actions{display:flex;gap:6px;flex-wrap:wrap;}
.btn-action{flex:1;min-width:80px;padding:7px 10px;border-radius:3px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;border:none;letter-spacing:0.5px;}
.btn-update{background:var(--gold);color:#000;}
.btn-renew{background:rgba(99,102,241,0.2);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3);}
.btn-portal{background:rgba(255,255,255,0.06);color:var(--white-dim);border:1px solid var(--border);}

// ── FIREBASE REST (sem auth — API key) ───────────────────────────────
const FS_BASE = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

function fv(val){ return {stringValue: String(val)}; }
function getFieldVal(f,k){
  if(!f||!f[k])return null;
  const v=f[k];
  return v.stringValue??v.integerValue??v.booleanValue??v.timestampValue??null;
}

async function fsGet(path){
  try{
    const r = await fetch(`${FS_BASE}/${path}?key=${FB_API_KEY}`);
    if(!r.ok) return null;
    const d = await r.json();
    if(d.error) return null;
    return d;
  }catch(e){ return null; }
}

async function fsPatch(path, fields){
  const fieldPaths = Object.keys(fields).map(k=>`updateMask.fieldPaths=${k}`).join('&');
  try{
    const r = await fetch(`${FS_BASE}/${path}?key=${FB_API_KEY}&${fieldPaths}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fields})
    });
    const d = await r.json();
    if(d.error) throw new Error(d.error.message);
    return d;
  }catch(e){ throw e; }
}

// Lista TODOS os documentos da coleção (clientes novos aparecem sozinhos)
async function fsList(collection){
  let docs=[], token=null, guard=0;
  do{
    const url=`${FS_BASE}/${collection}?key=${FB_API_KEY}&pageSize=300`+(token?`&pageToken=${token}`:'');
    let d=null;
    try{ const r=await fetch(url); if(r.ok) d=await r.json(); }catch(e){}
    if(!d||d.error) break;
    if(d.documents) docs=docs.concat(d.documents);
    token=d.nextPageToken; guard++;
  }while(token && guard<10);
  return docs;
}

// URL do portal: usa o mapa se existir, senão deriva do id (lb-<id>)
function portalUrl(id){
  return PORTAL_MAP[id] || ('https://luanbarretopersonal-creator.github.io/lb-'+id+'/');
}

  const docs = await fsList('clients');
  const fbById = {};
  docs.forEach(doc=>{ const id=doc.name.split('/').pop(); fbById[id]=doc.fields||{}; });

  // 2) União: clientes já conhecidos (PORTAL_MAP) + qualquer novo vindo do Firebase
  const ids = Array.from(new Set([ ...Object.keys(PORTAL_MAP), ...Object.keys(fbById) ]));
  let comDados = 0;

  const clients = ids.map(id => {
    const f = fbById[id] || {};
    if(fbById[id]) comDados++;
    const nome = getFieldVal(f,'nome') || getFieldVal(f,'name') ||
      id.split('-').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
    const seed = SEED[id] || {};
    const planUpdateDate = getFieldVal(f,'planUpdateDate')||null;
    const startDate      = getFieldVal(f,'startDate')||seed.ini||null;
    const renewalDate    = getFieldVal(f,'renewalDate')||seed.venc||null;
    const renewalValue   = getFieldVal(f,'renewalValue')||null;
    const lastFeedbackDate = getFieldVal(f,'lastFeedbackDate')||null;
    const lastActivity   = getFieldVal(f,'lastActivity')||getFieldVal(f,'lastUpdate')||null;
    let isActive = false;
    if(lastActivity){ try{isActive=(Date.now()-new Date(lastActivity).getTime())<7*24*3600*1000;}catch(e){} }
    return{id,nome,isActive,startDate,planUpdateDate,renewalDate,renewalValue,lastFeedbackDate,portal:portalUrl(id)};
  });
  clients.sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));

  document.getElementById('loading-msg').textContent=`${clients.length} clientes (${comDados} no Firebase)`;

  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    document.getElementById('dashboard').style.display='block';
    renderDashboard(clients);
  }, 400);
}

// ── SINCRONIZAR PLANILHA → FIREBASE (uma vez só) ─────────────────────
// Empurra início/vencimento da planilha para o Firebase, só onde ainda
// está vazio. Não sobrescreve renovação já definida no painel.
async function syncPlanilha(){
  if(!confirm('Enviar início/vencimento da planilha para o Firebase nos clientes que ainda estão sem essas datas?\n(Não sobrescreve renovação já definida.)')) return;
  document.getElementById('loading').style.display='flex';
  document.getElementById('loading-msg').textContent='Sincronizando planilha...';
  let ok=0, jaTinha=0, falha=0;
  for(const [id,s] of Object.entries(SEED)){
    try{
      const doc = await fsGet(`clients/${id}`);
      const f = doc?.fields || {};
      const upd = {};
      if(!getFieldVal(f,'startDate'))   upd.startDate   = fv(s.ini);
      if(!getFieldVal(f,'renewalDate')) upd.renewalDate = fv(s.venc);
      if(Object.keys(upd).length){ await fsPatch(`clients/${id}`, upd); ok++; }
      else jaTinha++;
    }catch(e){ falha++; }
  }
  document.getElementById('loading').style.display='none';
  showToast(`Sincronizado: ${ok} novos · ${jaTinha} já tinha · ${falha} falha(s)`);
  loadDashboard();
}

// ── RENDER ────────────────────────────────────────────────────────────
let allClients = [], currentFilter = 'all';

function weeksSince(d){ if(!d)return null; try{return Math.floor((Date.now()-new Date(d).getTime())/(7*24*3600*1000));}catch(e){return null;} }
function daysUntil(d){ if(!d)return null; try{const t=new Date(d);t.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);return Math.ceil((t-n)/86400000);}catch(e){return null;} }
function daysSince(d){ if(!d)return null; try{return Math.floor((Date.now()-new Date(d).getTime())/86400000);}catch(e){return null;} }
function fmtDate(d){ if(!d)return '—'; try{return new Date(d).toLocaleDateString('pt-BR');}catch(e){return d;} }

function renderDashboard(clients){
  allClients = clients;
  const tot = clients.length;
  const act = clients.filter(c=>c.isActive).length;
  const renewSoon = clients.filter(c=>{const d=daysUntil(c.renewalDate);return d!==null&&d<=15&&d>=0;});
  const renewOver = clients.filter(c=>{const d=daysUntil(c.renewalDate);return d!==null&&d<0;});
  const fbLate = clients.filter(c=>{const d=daysSince(c.lastFeedbackDate);return d===null||d>=28;});

  // Stats
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-num">${tot}</div><div class="stat-label">TOTAL CLIENTES</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#4ade80">${act}</div><div class="stat-label">ATIVOS 7 DIAS</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#fbbf24">${renewSoon.length+renewOver.length}</div><div class="stat-label">RENOVAÇÕES</div></div>`;

  // Alerts
  let alerts = '';
  if(renewOver.length) alerts+=`<div class="alert-section"><div class="alert-title">🔴 RENOVAÇÃO VENCIDA</div><div class="alert-list">${renewOver.map(c=>`<span class="alert-chip chip-red">${c.nome}</span>`).join('')}</div></div>`;
  if(renewSoon.length) alerts+=`<div class="alert-section"><div class="alert-title">🔵 RENOVAÇÃO EM BREVE (≤15d)</div><div class="alert-list">${renewSoon.map(c=>`<span class="alert-chip chip-blue">${c.nome}</span>`).join('')}</div></div>`;
  document.getElementById('alerts-area').innerHTML = alerts;

  renderCards();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards(){
  let list = allClients;
  if(currentFilter==='renew')   list=allClients.filter(c=>{const d=daysUntil(c.renewalDate);return d!==null&&d<=15;});
  if(currentFilter==='feedback')list=allClients.filter(c=>{const d=daysSince(c.lastFeedbackDate);return d===null||d>=28;});

  const w=weeksSince, du=daysUntil, ds=daysSince;
  document.getElementById('client-grid').innerHTML = list.map(c=>{
    const weeks=w(c.planUpdateDate), dRen=du(c.renewalDate), dFb=ds(c.lastFeedbackDate);
    let badges='';
    if(c.isActive) badges+='<span class="badge b-active">ATIVO</span>';
    else badges+='<span class="badge b-inactive">INATIVO</span>';
    if(dRen!==null&&dRen<=15) badges+=`<span class="badge b-renew">RENOVAÇÃO ${dRen<0?'VENCIDA':dRen+'d'}</span>`;
    return `<div class="client-card">
      <div class="card-header"><div class="card-name">${c.nome}</div><div class="card-badges">${badges}</div></div>
      <div class="card-info">
        Início: <span>${c.startDate?fmtDate(c.startDate):'—'}</span><br>
        Vencimento / Renovação: <span>${c.renewalDate?fmtDate(c.renewalDate)+(dRen!==null?' ('+dRen+'d)':''):'Não definida'}</span><br>
        Último treino: <span>${c.planUpdateDate?fmtDate(c.planUpdateDate)+(weeks!==null?' ('+weeks+'s)':''):'Nunca atualizado'}</span><br>
        Valor: <span>${c.renewalValue?'R$ '+c.renewalValue:'—'}</span><br>
        Último feedback: <span>${c.lastFeedbackDate?fmtDate(c.lastFeedbackDate)+(dFb!==null?' ('+dFb+'d)':''):'Nunca'}</span>
      </div>
      <div class="card-actions">
        <button class="btn-action btn-update" onclick="markPlanUpdated('${c.id}','${c.nome}')">✓ Plano Atualizado</button>
        <button class="btn-action btn-renew" onclick="openRenewalModal('${c.id}','${c.nome}','${c.renewalDate||''}')">🔄 Renovar</button>
        ${c.portal?`<button class="btn-action btn-portal" onclick="window.open('${c.portal}','_blank')">🔗 Portal</button>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── AÇÕES ─────────────────────────────────────────────────────────────
async function markPlanUpdated(id, nome){
  showToast('Salvando...');
  const today = new Date().toISOString().split('T')[0];
  try{
    await fsPatch(`clients/${id}`, {
      planUpdateDate: fv(today+'T12:00:00'),
      lastActivity: fv(new Date().toISOString())
    });
    // Atualizar local
    const c = allClients.find(x=>x.id===id);
    if(c){ c.planUpdateDate=today+'T12:00:00'; c.isActive=true; }
    renderCards();
    showToast(`✓ Plano de ${nome} marcado como atualizado!`);
  }catch(e){
    showToast('Erro ao salvar: '+e.message);
  }
}

let _modalId='', _modalNome='';
function openRenewalModal(id, nome, currentDate){
  _modalId=id; _modalNome=nome;
  document.getElementById('modal-title').textContent='Renovação — '+nome;
  document.getElementById('modal-date').value=(currentDate||'').slice(0,10);
  document.getElementById('modal-value').value='';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
}
async function saveRenewal(){
  const date = document.getElementById('modal-date').value;
  const val  = document.getElementById('modal-value').value;
  if(!date){ showToast('Selecione uma data.'); return; }
  closeModal();
  showToast('Salvando renovação...');
  try{
    const fields = { renewalDate: fv(date+'T12:00:00') };
    if(val) fields.renewalValue = fv(val);
    await fsPatch(`clients/${_modalId}`, fields);
    const c = allClients.find(x=>x.id===_modalId);
    if(c){ c.renewalDate=date+'T12:00:00'; if(val)c.renewalValue=val; }
    renderCards();
    showToast(`✓ Renovação de ${_modalNome} salva!`);
  }catch(e){ showToast('Erro: '+e.message); }
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.style.display='none',3000);
}

// ── INIT ──────────────────────────────────────────────────────────────
if(localStorage.getItem('lb_auth')==='ok'){
  document.getElementById('login-screen').style.display='none';
  loadDashboard();
}
</script>
