<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Consultoria LB</title>
<style>
:root{--gold:#c9a84c;--gold-light:#e2c47a;--bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;--white:#ffffff;--white-dim:rgba(255,255,255,0.6);--green:#4caf50;--red:#f44336;--blue:#2196f3;--yellow:#ff9800;--border:rgba(201,168,76,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:'Segoe UI',sans-serif;min-height:100vh}
#loading{display:flex;position:fixed;inset:0;background:rgba(10,10,10,0.95);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:48px;height:48px;border:4px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{color:var(--gold);font-size:14px;letter-spacing:2px;text-transform:uppercase}
#login-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.login-logo{font-size:48px}
.login-brand{font-family:Georgia,serif;font-size:32px;color:var(--gold);letter-spacing:4px}
.login-sub{font-size:11px;color:var(--white-dim);letter-spacing:6px;text-transform:uppercase;margin-top:4px}
#btn-login{display:flex;align-items:center;gap:12px;background:#fff;color:#333;border:none;padding:14px 28px;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:16px}
#btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
#btn-login img{width:20px;height:20px}
#login-error{color:var(--red);font-size:13px;max-width:320px;text-align:center;display:none}
#login-status{color:var(--white-dim);font-size:12px;letter-spacing:1px}
.login-restrict{color:var(--white-dim);font-size:12px;letter-spacing:1px;margin-top:8px}
nav{background:var(--card);border-bottom:1px solid rgba(201,168,76,0.2);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:Georgia,serif;font-size:20px;color:var(--gold);letter-spacing:3px}
.nav-right{display:flex;align-items:center;gap:16px}
#nav-email{color:var(--white-dim);font-size:13px}
#btn-logout{background:transparent;border:1px solid rgba(201,168,76,0.4);color:var(--gold);padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;transition:all 0.2s}
#btn-logout:hover{background:rgba(201,168,76,0.1)}
#dashboard{display:none}
main{padding:32px 24px;max-width:1400px;margin:0 auto}
.section-title{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--white-dim);margin-bottom:20px}
#stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid rgba(201,168,76,0.15);border-radius:12px;padding:24px;text-align:center}
.stat-num{font-size:36px;font-weight:700;color:var(--gold);margin-bottom:4px}
.stat-label{font-size:12px;color:var(--white-dim);letter-spacing:1px}
/* ALERTAS */
#alert-bar{background:rgba(244,67,54,0.08);border:1px solid rgba(244,67,54,0.25);border-radius:8px;padding:14px 20px;margin-bottom:20px;display:none}
.alert-title{font-size:13px;font-weight:600;color:#f44336;margin-bottom:8px;letter-spacing:.5px}
.alert-chips{display:flex;flex-wrap:wrap;gap:6px}
.alert-chip{background:rgba(244,67,54,0.12);border:1px solid rgba(244,67,54,0.25);border-radius:20px;padding:3px 10px;font-size:11px;color:#ef9a9a;cursor:pointer}
.alert-chip:hover{background:rgba(244,67,54,0.2)}
#renewal-bar{background:rgba(255,152,0,0.08);border:1px solid rgba(255,152,0,0.25);border-radius:8px;padding:14px 20px;margin-bottom:24px;display:none}
.renewal-title{font-size:13px;font-weight:600;color:#ff9800;margin-bottom:8px;letter-spacing:.5px}
/* GRID */
#clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.client-card{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px;color:inherit;transition:all 0.25s}
.client-card:hover{border-color:rgba(201,168,76,0.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.client-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.client-name{font-size:16px;font-weight:600;color:var(--white)}
.client-portal-link{font-size:11px;color:var(--gold);text-decoration:none;opacity:0.7;margin-top:2px;display:block}
.client-portal-link:hover{opacity:1}
.client-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500;letter-spacing:0.5px;white-space:nowrap}
.badge-active{background:rgba(76,175,80,0.15);color:#81c784;border:1px solid rgba(76,175,80,0.3)}
.badge-inactive{background:rgba(244,67,54,0.1);color:#e57373;border:1px solid rgba(244,67,54,0.2)}
.badge-peso{background:rgba(33,150,243,0.12);color:#64b5f6;border:1px solid rgba(33,150,243,0.25)}
.badge-foto{background:rgba(156,39,176,0.12);color:#ce93d8;border:1px solid rgba(156,39,176,0.25)}
/* PLANO E RENOVAÇÃO */
.plan-info{background:rgba(0,0,0,0.2);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.plan-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.plan-label{font-size:10px;color:var(--white-dim);letter-spacing:1px;text-transform:uppercase}
.plan-value{font-size:11px;font-weight:600}
.weeks-badge{padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700}
.weeks-ok{background:rgba(76,175,80,0.15);color:#81c784;border:1px solid rgba(76,175,80,0.3)}
.weeks-warn{background:rgba(255,152,0,0.15);color:#ffb74d;border:1px solid rgba(255,152,0,0.3)}
.weeks-overdue{background:rgba(244,67,54,0.15);color:#ef9a9a;border:1px solid rgba(244,67,54,0.3)}
.renewal-badge{padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700}
.renewal-ok{background:rgba(76,175,80,0.12);color:#81c784;border:1px solid rgba(76,175,80,0.25)}
.renewal-warn{background:rgba(255,152,0,0.12);color:#ffb74d;border:1px solid rgba(255,152,0,0.25)}
.renewal-due{background:rgba(244,67,54,0.12);color:#ef9a9a;border:1px solid rgba(244,67,54,0.25)}
/* BOTÕES */
.client-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-sm{border:none;border-radius:6px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:.3px}
.btn-update{background:rgba(76,175,80,0.15);color:#81c784;border:1px solid rgba(76,175,80,0.3)}
.btn-update:hover{background:rgba(76,175,80,0.25)}
.btn-renewal{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3)}
.btn-renewal:hover{background:rgba(201,168,76,0.25)}
.btn-portal{background:rgba(33,150,243,0.12);color:#64b5f6;border:1px solid rgba(33,150,243,0.25);text-decoration:none;display:inline-block;line-height:1}
.btn-portal:hover{background:rgba(33,150,243,0.2)}
/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;align-items:center;justify-content:center}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;width:360px;max-width:90vw}
.modal-title{font-size:16px;font-weight:600;color:var(--gold);margin-bottom:16px}
.modal-label{font-size:11px;color:var(--white-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
.modal-input{width:100%;background:#0f0f0f;border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--white);font-size:14px;outline:none;margin-bottom:16px}
.modal-input:focus{border-color:var(--gold)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-confirm{background:var(--gold);color:#000;border:none;border-radius:6px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--white-dim);border-radius:6px;padding:10px 20px;font-size:13px;cursor:pointer}
#toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid rgba(76,175,80,0.4);border-radius:8px;padding:12px 20px;font-size:13px;color:#81c784;z-index:3000;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
</style>
</head>

let idToken = '';
let modalCallback = null;

// ── Auth helpers ──
function showLoading(m){document.getElementById('loading').style.display='flex';document.getElementById('loading-msg').textContent=m||'Carregando...';}
function hideLoading(){document.getElementById('loading').style.display='none';}
function showError(m){const e=document.getElementById('login-error');e.textContent=m;e.style.display='block';}
function setStatus(m){document.getElementById('login-status').textContent=m;}
function showLoginScreen(){document.getElementById('login-screen').style.display='flex';document.getElementById('dashboard').style.display='none';hideLoading();}
function saveSession(t,e,x){localStorage.setItem('lb_id_token',t);localStorage.setItem('lb_email',e);localStorage.setItem('lb_expiry',x);}
function loadSession(){const t=localStorage.getItem('lb_id_token'),e=localStorage.getItem('lb_email'),x=parseInt(localStorage.getItem('lb_expiry')||'0');if(t&&e&&Date.now()<x)return{idToken:t,email:e};return null;}
function clearSession(){localStorage.removeItem('lb_id_token');localStorage.removeItem('lb_email');localStorage.removeItem('lb_expiry');}

function startGoogleLogin(){
  const s=Math.random().toString(36).substring(2,15);
  sessionStorage.setItem('oauth_state',s);
  const p=new URLSearchParams({client_id:GOOGLE_CLIENT_ID,redirect_uri:REDIRECT_URI,response_type:'token',scope:'email profile openid',state:s,include_granted_scopes:'true',prompt:'select_account'});
  window.location.href='https://accounts.google.com/o/oauth2/v2/auth?'+p.toString();
}

async function googleTokenToFirebase(at){
  const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithIdp?key='+FB_API_KEY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({postBody:'access_token='+encodeURIComponent(at)+'&providerId=google.com',requestUri:REDIRECT_URI,returnIdpCredential:true,returnSecureToken:true})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||'Firebase auth failed');
  return d;
}

// ── Firestore helpers ──
async function fsGet(path){
  const r=await fetch(`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/${path}`,{headers:{'Authorization':'Bearer '+idToken}});
  return r.json();
}

async function fsSet(path, fields){
  const r=await fetch(`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/${path}`,{
    method:'PATCH',
    headers:{'Authorization':'Bearer '+idToken,'Content-Type':'application/json'},
    body:JSON.stringify({fields})
  });
  return r.json();
}

function fv(v){ // field value shortcut
  if(typeof v === 'string') return {stringValue: v};
  if(typeof v === 'number') return {integerValue: String(v)};
  return {stringValue: String(v)};
}

function getFieldVal(f,k){
  if(!f||!f[k])return null;
  const v=f[k];
  return v.stringValue??v.integerValue??v.booleanValue??v.timestampValue??null;
}

// ── Plan data ──
async function savePlanUpdate(clientId){
  const today = new Date().toISOString().split('T')[0];
  await fsSet(`clients/${clientId}`, {
    planUpdateDate: fv(today),
    lastActivity: fv(new Date().toISOString())
  });
  showToast('✓ Plano marcado como atualizado hoje!');
}

async function saveRenewalDate(clientId, date, value){
  const fields = { renewalDate: fv(date) };
  if(value) fields.renewalValue = fv(Number(value));
  await fsSet(`clients/${clientId}`, fields);
  showToast('✓ Data de renovação salva!');
}

// ── Toast ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

// ── Modal ──
function openRenewalModal(clientId, clientName, currentDate){
  document.getElementById('modal-title').textContent = `Renovação — ${clientName}`;
  document.getElementById('modal-label').textContent = 'Data da próxima renovação';
  document.getElementById('modal-input').type = 'date';
  document.getElementById('modal-input').value = currentDate || '';
  document.getElementById('modal-value-wrap').style.display = 'block';
  document.getElementById('modal-value').value = '';
  document.getElementById('modal').style.display = 'flex';
  modalCallback = async () => {
    const date = document.getElementById('modal-input').value;
    const value = document.getElementById('modal-value').value;
    if(!date){showToast('Selecione uma data');return;}
    await saveRenewalDate(clientId, date, value);
    closeModal();
    setTimeout(()=>location.reload(), 1500);
  };
  document.getElementById('modal-confirm').onclick = modalCallback;
}

function closeModal(){document.getElementById('modal').style.display='none';}

// ── Weeks helpers ──
function weeksSince(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr);
  const diff=Date.now()-d.getTime();
  return Math.floor(diff/(7*24*3600*1000));
}

function daysUntil(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr);
  const diff=d.getTime()-Date.now();
  return Math.ceil(diff/(24*3600*1000));
}

function weeksBadge(weeks){
  if(weeks===null)return '<span class="badge" style="background:rgba(255,255,255,0.05);color:#666">Sem registro</span>';
  if(weeks<4)return `<span class="weeks-badge weeks-ok">🟢 Semana ${weeks+1} · em dia</span>`;
  if(weeks<6)return `<span class="weeks-badge weeks-warn">🟡 ${weeks} sem · cobrar feedback</span>`;
  return `<span class="weeks-badge weeks-overdue">🔴 ${weeks} sem · atualizar plano</span>`;
}

function renewalBadge(dateStr, value){
  if(!dateStr)return '<span class="badge" style="background:rgba(255,255,255,0.05);color:#666">Sem renovação</span>';
  const days=daysUntil(dateStr);
  const d=new Date(dateStr).toLocaleDateString('pt-BR');
  const val=value?` · R$${value}`:'';
  if(days<0)return `<span class="renewal-badge renewal-due">🔴 Venceu ${Math.abs(days)}d atrás${val}</span>`;
  if(days<=15)return `<span class="renewal-badge renewal-warn">🟡 ${d} · ${days}d${val}</span>`;
  return `<span class="renewal-badge renewal-ok">🟢 ${d} · ${days}d${val}</span>`;
}

// ── Load clients ──
async function loadClients(t){
  const r=await fetch(`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/clients?pageSize=100`,{headers:{'Authorization':'Bearer '+t}});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  const docs=d.documents||[];
  try{
    const r2=await fetch(`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/clientes?pageSize=50`,{headers:{'Authorization':'Bearer '+t}});
    const d2=await r2.json();
    if(d2.documents)docs.push(...d2.documents);
  }catch(e){}
  return docs;
}

function processClients(docs){
  const now=Date.now(), d7=7*24*3600*1000;
  const seen=new Set();
  return docs.filter(doc=>{
    const id=doc.name.split('/').pop();
    if(seen.has(id))return false;
    seen.add(id);
    return true;
  }).map(doc=>{
    const id=doc.name.split('/').pop(), f=doc.fields||{};
    let isActive=false;
    const la=getFieldVal(f,'lastActivity')||getFieldVal(f,'lastUpdate')||getFieldVal(f,'updatedAt');
    if(la){try{isActive=(now-new Date(la).getTime())<d7;}catch(e){}}
    const hasPeso=!!(getFieldVal(f,'peso')||getFieldVal(f,'pesoAtual'));
    const hasFoto=!!(getFieldVal(f,'foto')||getFieldVal(f,'fotoUrl')||getFieldVal(f,'photoUrl'));
    const nome=getFieldVal(f,'nome')||getFieldVal(f,'name')||id.split('-').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
    const portal=PORTAL_MAP[id]||null;
    const planUpdateDate=getFieldVal(f,'planUpdateDate')||null;
    const renewalDate=getFieldVal(f,'renewalDate')||null;
    const renewalValue=getFieldVal(f,'renewalValue')||null;
    return{id,nome,isActive,hasPeso,hasFoto,portal,planUpdateDate,renewalDate,renewalValue};
  });
}

// ── Render dashboard ──
function renderDashboard(email, clients){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('nav-email').textContent=email;

  // Stats
  const tot=clients.length, act=clients.filter(c=>c.isActive).length;
  const overdueClients=clients.filter(c=>weeksSince(c.planUpdateDate)>=6);
  const warnClients=clients.filter(c=>{const w=weeksSince(c.planUpdateDate);return w>=4&&w<6;});
  const renewalSoon=clients.filter(c=>{const d=daysUntil(c.renewalDate);return d!==null&&d<=15&&d>=0;});
  const renewalOverdue=clients.filter(c=>{const d=daysUntil(c.renewalDate);return d!==null&&d<0;});

  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-num">${tot}</div><div class="stat-label">Total Clientes</div></div>
    <div class="stat-card"><div class="stat-num">${act}</div><div class="stat-label">Ativos (7 dias)</div></div>
    <div class="stat-card" style="border-color:rgba(244,67,54,0.3)"><div class="stat-num" style="color:#f44336">${overdueClients.length}</div><div class="stat-label">Planos Vencidos</div></div>
    <div class="stat-card" style="border-color:rgba(255,152,0,0.3)"><div class="stat-num" style="color:#ff9800">${warnClients.length}</div><div class="stat-label">Cobrar Feedback</div></div>
    <div class="stat-card" style="border-color:rgba(255,152,0,0.3)"><div class="stat-num" style="color:#ff9800">${renewalSoon.length+renewalOverdue.length}</div><div class="stat-label">Renovações</div></div>
  `;

  // Alert bars
  if(overdueClients.length||warnClients.length){
    const bar=document.getElementById('alert-bar');
    bar.style.display='block';
    bar.querySelector('.alert-chips').innerHTML=[...overdueClients,...warnClients].map(c=>
      `<span class="alert-chip" onclick="scrollToClient('${c.id}')">${c.nome}</span>`
    ).join('');
  }

  if(renewalSoon.length||renewalOverdue.length){
    const bar=document.getElementById('renewal-bar');
    bar.style.display='block';
    bar.querySelector('.alert-chips').innerHTML=[...renewalOverdue,...renewalSoon].map(c=>
      `<span class="alert-chip" style="color:#ffb74d;border-color:rgba(255,152,0,0.3)" onclick="scrollToClient('${c.id}')">${c.nome} · ${daysUntil(c.renewalDate)<0?'VENCIDO':daysUntil(c.renewalDate)+'d'}</span>`
    ).join('');
  }

  // Client cards
  if(!clients.length){
    document.getElementById('clients-grid').innerHTML='<p style="color:var(--white-dim)">Nenhum cliente encontrado.</p>';
    return;
  }

  // Sort: overdue first, then warn, then ok
  clients.sort((a,b)=>{
    const wa=weeksSince(a.planUpdateDate)||0, wb=weeksSince(b.planUpdateDate)||0;
    return wb-wa;
  });

  document.getElementById('clients-grid').innerHTML=clients.map(c=>{
    const weeks=weeksSince(c.planUpdateDate);
    const badges=[];
    if(c.isActive)badges.push('<span class="badge badge-active">Ativo</span>');
    else badges.push('<span class="badge badge-inactive">Inativo</span>');
    if(c.hasPeso)badges.push('<span class="badge badge-peso">Peso</span>');
    if(c.hasFoto)badges.push('<span class="badge badge-foto">Foto</span>');

    return `
    <div class="client-card" id="card-${c.id}">
      <div class="client-header">
        <div>
          <div class="client-name">${c.nome}</div>
          ${c.portal?`<a class="client-portal-link" href="${c.portal}" target="_blank">${c.portal.replace('https://','').replace(/\/$/,'')} ↗</a>`:''}
        </div>
      </div>
      <div class="client-meta">${badges.join('')}</div>
      <div class="plan-info">
        <div class="plan-row">
          <span class="plan-label">Plano atual</span>
          ${weeksBadge(weeks)}
        </div>
        <div class="plan-row" style="margin-bottom:0">
          <span class="plan-label">Renovação</span>
          ${renewalBadge(c.renewalDate, c.renewalValue)}
        </div>
      </div>
      <div class="client-actions">
        ${c.portal?`<a class="btn-sm btn-portal" href="${c.portal}" target="_blank">🔗 Portal</a>`:''}
        <button class="btn-sm btn-update" onclick="markPlanUpdated('${c.id}','${c.nome}')">✓ Plano atualizado</button>
        <button class="btn-sm btn-renewal" onclick="openRenewalModal('${c.id}','${c.nome}','${c.renewalDate||''}')">📅 Renovação</button>
      </div>
    </div>`;
  }).join('');
}

function scrollToClient(id){
  const el=document.getElementById('card-'+id);
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

async function markPlanUpdated(id, nome){
  await savePlanUpdate(id);
  setTimeout(()=>location.reload(), 1500);
}

// ── Init ──
async function init(){
  const hash=window.location.hash;
  if(hash&&hash.includes('access_token')){
    showLoading('Autenticando...');
    history.replaceState(null,'',window.location.pathname);
    const p=new URLSearchParams(hash.substring(1)), at=p.get('access_token');
    if(!at){showLoginScreen();showError('Token não recebido.');return;}
    try{
      const fb=await googleTokenToFirebase(at);
      if(fb.email!==ALLOWED_EMAIL){clearSession();showLoginScreen();showError('Acesso negado: '+fb.email);return;}
      const exp=Date.now()+(parseInt(fb.expiresIn||3600)*1000);
      saveSession(fb.idToken,fb.email,exp);
      idToken=fb.idToken;
      setStatus('Carregando clientes...');
      const docs=await loadClients(fb.idToken);
      const clients=processClients(docs);
      hideLoading();
      renderDashboard(fb.email,clients);
    }catch(err){showLoginScreen();showError('Erro: '+err.message);}
    return;
  }
  const sess=loadSession();
  if(sess){
    showLoading('Carregando dashboard...');
    try{
      idToken=sess.idToken;
      const docs=await loadClients(sess.idToken);
      const clients=processClients(docs);
      hideLoading();
      renderDashboard(sess.email,clients);
    }catch(e){clearSession();showLoginScreen();}
    return;
  }
  showLoginScreen();
}

document.getElementById('btn-login').addEventListener('click',startGoogleLogin);
document.getElementById('btn-logout').addEventListener('click',()=>{clearSession();showLoginScreen();});
document.getElementById('modal').addEventListener('click',(e)=>{if(e.target===document.getElementById('modal'))closeModal();});
init();
</script>
